<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Immigration Origins Over Time</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #111;
        --muted: #5a5a5a;
        --panel: #ffffff;
        --accent: #b33a2b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Source Serif 4", "Times New Roman", serif;
        color: var(--ink);
        background: #ffffff;
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 20px 56px;
      }
      h1 {
        font-size: 32px;
        margin: 0 0 8px;
        letter-spacing: 0.3px;
      }
      p {
        margin: 0 0 18px;
        color: var(--muted);
        max-width: 720px;
      }
      .panel {
        background: var(--panel) !important;
        border: 1px solid #e6ded0;
        border-radius: 18px;
        padding: 18px 18px 6px;
        margin: 18px 0 28px;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.08);
      }
      .panel h2 {
        margin: 0 0 12px;
        font-size: 20px;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        align-items: center;
        margin-bottom: 10px;
        font-size: 14px;
        color: var(--muted);
      }
      .controls label {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        cursor: pointer;
      }
      canvas {
        width: 100%;
        height: 380px;
        background: #ffffff;
      }
      .note {
        font-size: 12px;
        color: #6a6a6a;
        margin-top: 10px;
      }
      @media (max-width: 720px) {
        h1 { font-size: 26px; }
        canvas { height: 320px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Origins Over Time</h1>

      <section class="panel">
        <h2>Region totals by period</h2>
        <div class="controls">
          <label><input id="stackedToggle" type="checkbox" checked> Stacked area</label>
          <label><input id="showNotSpecified" type="checkbox"> Show Not Specified</label>
        </div>
        <canvas id="regionChart" aria-label="Region totals chart"></canvas>
        <div class="note">Source: U.S. Department of Homeland Security.</div>
      </section>

      <section class="panel">
        <h2>Overall total by year</h2>
        <canvas id="totalChart" aria-label="Total annual chart"></canvas>
        <div class="note">Source: U.S. Department of Homeland Security.</div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

        "1820 to 1829", "1830 to 1839", "1840 to 1849", "1850 to 1859",

        "1900 to 1909", "1910 to 1919", "1920 to 1929", "1930 to 1939",
        "1940 to 1949", "1950 to 1959", "1960 to 1969", "1970 to 1979",
        "1980 to 1989", "1990 to 1999", "2000 to 2009", "2010",
        "2011", "2012", "2013", "2014", "2015"

        "Africa": [19, 66, 67, 104, 458, 441, 768, 432, 6326, 8867, 6362, 2120, 6720, 13016, 23780, 71405, 141987, 346410, 759734, 98246, 97429, 103685, 94589, 94834, 98677],
        "Oceania": [2, 1, 3, 110, 107, 9094, 7341, 3279, 11677, 12339, 9860, 3240, 14262, 11319, 23659, 39983, 41432, 56800, 65793, 5946, 5825, 5573, 6061, 5980, 6227],
        "Not Specified": [19173, 83495, 7196, 71442, 15472, 592, 778, 14112, 33493, 488, 930, null, 135, 12472, 119, 326, 305406, 25928, 211930, 5814, 6217, 9265, 10127, 8430, 10256]
      };

      const regionColors = {
        "Europe": "#b33a2b",
        "Asia": "#d69f2a",
        "America": "#2f7d6b",
        "Africa": "#4b63b3",
        "Oceania": "#8b3fb0",
        "Not Specified": "#6a6a6a"
      };

      const regionDatasets = Object.keys(regionSeries)
        .filter((name) => name !== "Not Specified")
        .map((name) => ({
          label: name,
          data: regionSeries[name],
          borderColor: regionColors[name],
          backgroundColor: regionColors[name] + "55",
          fill: true,
          tension: 0.2,
          borderWidth: 2,
          pointRadius: 2
        }));

      const regionChart = new Chart(document.getElementById("regionChart"), {
        type: "line",
        data: {
          labels: periodLabels,
          datasets: regionDatasets
        },
        options: {
          responsive: true,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: { position: "bottom" },
            tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.formattedValue}` } }
          },
          scales: {
            x: { grid: { display: false } },
            y: { stacked: true, ticks: { callback: (v) => v.toLocaleString() } }
          }
        }
      });

      const totalCsv = `Year,Number,Year,Number,Year,Number,Year,Number,

1869 ,"352,768 ",1919 ,"141,132 ",1969 ,"358,579 ",,,`;

      const yearMatches = [...totalCsv.matchAll(/(\d{4})\s*,\s*\"?([\d, ]+)\"?/g)];
      const annualYears = [];
      const annualTotals = [];
      for (const match of yearMatches) {
        const year = Number(match[1]);
        const value = Number(match[2].replace(/[^\d]/g, ""));
        if (!Number.isNaN(year) && !Number.isNaN(value)) {
          annualYears.push(year);
          annualTotals.push(value);
        }
      }

      const totalChart = new Chart(document.getElementById("totalChart"), {
        type: "line",
        data: {
          labels: annualYears,
          datasets: [{
            label: "Total",
            data: annualTotals,
            borderColor: "#b33a2b",
            backgroundColor: "#b33a2b33",
            borderWidth: 2,
            pointRadius: 0,
            fill: true,
            tension: 0.2
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: (ctx) => `Total: ${ctx.formattedValue}` } }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { maxTicksLimit: 12 }
            },
            y: { ticks: { callback: (v) => v.toLocaleString() } }
          }
        }
      });

      const stackedToggle = document.getElementById("stackedToggle");
      const showNotSpecified = document.getElementById("showNotSpecified");

      stackedToggle.addEventListener("change", () => {
        const stacked = stackedToggle.checked;
        regionChart.options.scales.y.stacked = stacked;
        regionChart.data.datasets.forEach((ds) => { ds.fill = stacked; });
        regionChart.update();
      });

      showNotSpecified.addEventListener("change", () => {
        const existingIndex = regionChart.data.datasets.findIndex((ds) => ds.label === "Not Specified");
        if (showNotSpecified.checked && existingIndex === -1) {
          regionChart.data.datasets.push({
            label: "Not Specified",
            data: regionSeries["Not Specified"],
            borderColor: regionColors["Not Specified"],
            backgroundColor: regionColors["Not Specified"] + "55",
            fill: regionChart.options.scales.y.stacked,
            tension: 0.2,
            borderWidth: 2,
            pointRadius: 2
          });
        } else if (!showNotSpecified.checked && existingIndex !== -1) {
          regionChart.data.datasets.splice(existingIndex, 1);
        }
        regionChart.update();
      });
    </script>
  </body>
</html>
